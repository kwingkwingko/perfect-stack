<!DOCTYPE html>
<html>
<head>
  <title>Perfect Stack - App Icon Generator</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, sans-serif;
      color: #fff;
    }
    canvas {
      border-radius: 180px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      margin: 20px;
    }
    button {
      padding: 14px 36px;
      font-size: 18px;
      font-weight: 700;
      background: #FFD700;
      color: #0A0A1A;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #FFC107; }
    p { color: #888; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Perfect Stack — App Icon (1024x1024)</h2>
  <canvas id="icon" width="1024" height="1024"></canvas>
  <button onclick="download()">Download Icon (PNG)</button>
  <p>The downloaded file will have square corners — Apple/Google rounds them automatically.</p>

  <script>
    const S = 1024;
    const c = document.getElementById("icon");
    const ctx = c.getContext("2d");

    const PALETTE = [
      "#FF6B6B", "#FF8E53", "#FFC107", "#66BB6A",
      "#42A5F5", "#7E57C2", "#EC407A", "#26C6DA",
    ];

    // Background — dark gradient
    const bg = ctx.createRadialGradient(S / 2, S / 2, 100, S / 2, S / 2, S * 0.7);
    bg.addColorStop(0, "#161638");
    bg.addColorStop(1, "#0A0A1A");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, S, S);

    // Subtle grid pattern
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 1;
    for (let i = 0; i < S; i += 64) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, S); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(S, i); ctx.stroke();
    }

    // --- TOP BLOCKS (above text) ---
    const blockW = 300;
    const blockH = 55;
    const topStackX = (S - blockW) / 2;
    const topBlocks = 3;

    // Moving block with trail at the very top
    const movY = 60;
    const movColor = PALETTE[3];
    ctx.globalAlpha = 0.07;
    drawBlock(ctx, topStackX + 90, movY, blockW, blockH, movColor);
    ctx.globalAlpha = 0.15;
    drawBlock(ctx, topStackX + 50, movY, blockW, blockH, movColor);
    ctx.globalAlpha = 1;
    drawBlock(ctx, topStackX + 20, movY, blockW, blockH, movColor);

    // Stacked blocks above text
    for (let i = 0; i < topBlocks; i++) {
      const y = 130 + i * (blockH + 5);
      drawBlock(ctx, topStackX, y, blockW, blockH, PALETTE[i]);
    }

    // Sparkles between top blocks and text
    drawSparkles(ctx, S / 2, 125, blockW);

    // --- CENTER TEXT ---
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // "PERFECT" shadow
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.font = "bold 100px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("PERFECT", S / 2 + 3, S / 2 - 30 + 3);

    // "PERFECT" white
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 100px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("PERFECT", S / 2, S / 2 - 30);

    // "STACK" shadow
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.font = "bold 120px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("STACK", S / 2 + 3, S / 2 + 75 + 3);

    // "STACK" gold gradient
    const tGrad = ctx.createLinearGradient(S / 2 - 200, S / 2 + 30, S / 2 + 200, S / 2 + 120);
    tGrad.addColorStop(0, "#FFD700");
    tGrad.addColorStop(0.5, "#FFF3B0");
    tGrad.addColorStop(1, "#FFD700");
    ctx.fillStyle = tGrad;
    ctx.font = "bold 120px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("STACK", S / 2, S / 2 + 75);

    // --- BOTTOM BLOCKS (below text) ---
    const botStartY = S / 2 + 160;
    const botBlocks = 4;

    for (let i = 0; i < botBlocks; i++) {
      const y = botStartY + i * (blockH + 5);
      drawBlock(ctx, topStackX, y, blockW, blockH, PALETTE[(i + 4) % PALETTE.length]);
    }

    // Sparkles on bottom stack
    drawSparkles(ctx, S / 2, botStartY - 5, blockW);

    // Tagline
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.font = "500 28px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("TAP \u2022 STACK \u2022 COMPETE", S / 2, botStartY + botBlocks * (blockH + 5) + 25);

    // Developer credit
    ctx.fillStyle = "rgba(255,255,255,0.45)";
    ctx.font = "500 26px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("- KWNG -", S / 2, botStartY + botBlocks * (blockH + 5) + 60);

    // --- Helper functions ---

    function drawBlock(ctx, x, y, w, h, color) {
      const r = 14;
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      roundRect(ctx, x + 4, y + 4, w, h, r);
      ctx.fill();
      const grad = ctx.createLinearGradient(x, y, x, y + h);
      grad.addColorStop(0, lighten(color, 20));
      grad.addColorStop(0.5, color);
      grad.addColorStop(1, darken(color, 20));
      ctx.fillStyle = grad;
      roundRect(ctx, x, y, w, h, r);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      roundRect(ctx, x + 8, y + 4, w - 16, h * 0.35, r - 4);
      ctx.fill();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawSparkles(ctx, cx, cy, spread) {
      const sparkles = [
        { x: cx - spread * 0.5, y: cy - 15, s: 10 },
        { x: cx + spread * 0.5, y: cy - 10, s: 8 },
        { x: cx - spread * 0.25, y: cy - 30, s: 7 },
        { x: cx + spread * 0.3, y: cy - 25, s: 11 },
        { x: cx, y: cy - 38, s: 9 },
      ];
      sparkles.forEach(sp => {
        ctx.fillStyle = "rgba(255, 215, 0, 0.9)";
        drawStar(ctx, sp.x, sp.y, sp.s);
      });
    }

    function drawStar(ctx, x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        ctx.rotate(Math.PI / 4);
        ctx.lineTo(0, size);
        ctx.lineTo(0, size * 0.35);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function lighten(hex, pct) {
      const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + pct);
      const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + pct);
      const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + pct);
      return `rgb(${r},${g},${b})`;
    }

    function darken(hex, pct) {
      const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - pct);
      const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - pct);
      const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - pct);
      return `rgb(${r},${g},${b})`;
    }

    function download() {
      const link = document.createElement("a");
      link.download = "app-icon-1024x1024.png";
      link.href = c.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
