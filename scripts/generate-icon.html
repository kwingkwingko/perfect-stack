<!DOCTYPE html>
<html>
<head>
  <title>Perfect Stack - App Icon Generator</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, sans-serif;
      color: #fff;
    }
    canvas {
      border-radius: 180px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      margin: 20px;
    }
    button {
      padding: 14px 36px;
      font-size: 18px;
      font-weight: 700;
      background: #FFD700;
      color: #0A0A1A;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #FFC107; }
    p { color: #888; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Perfect Stack — App Icon (1024x1024)</h2>
  <canvas id="icon" width="1024" height="1024"></canvas>
  <button onclick="download()">Download Icon (PNG)</button>
  <p>The downloaded file will have square corners — Apple rounds them automatically.</p>

  <script>
    const S = 1024;
    const c = document.getElementById("icon");
    const ctx = c.getContext("2d");

    // Colors from the game palette
    const PALETTE = [
      "#FF6B6B", "#FF8E53", "#FFC107", "#66BB6A",
      "#42A5F5", "#7E57C2", "#EC407A", "#26C6DA",
    ];

    // Background — dark gradient
    const bg = ctx.createLinearGradient(0, 0, 0, S);
    bg.addColorStop(0, "#0F0F2A");
    bg.addColorStop(1, "#0A0A1A");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, S, S);

    // Subtle grid pattern
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 1;
    for (let i = 0; i < S; i += 64) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, S); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(S, i); ctx.stroke();
    }

    // Draw stacked blocks
    const blockW = 340;
    const blockH = 70;
    const startX = (S - blockW) / 2;
    const startY = 720; // bottom of stack
    const blocks = 7;
    const gap = 6;

    for (let i = 0; i < blocks; i++) {
      const x = startX;
      const y = startY - i * (blockH + gap);
      const color = PALETTE[i % PALETTE.length];
      const r = 14;

      // Block shadow
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      roundRect(ctx, x + 4, y + 4, blockW, blockH, r);
      ctx.fill();

      // Block body — gradient
      const grad = ctx.createLinearGradient(x, y, x, y + blockH);
      grad.addColorStop(0, lighten(color, 20));
      grad.addColorStop(0.5, color);
      grad.addColorStop(1, darken(color, 20));
      ctx.fillStyle = grad;
      roundRect(ctx, x, y, blockW, blockH, r);
      ctx.fill();

      // Shine on top
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      roundRect(ctx, x + 8, y + 4, blockW - 16, blockH * 0.35, r - 4);
      ctx.fill();

      // Top block sparkle effect (perfect indicator)
      if (i === blocks - 1) {
        drawSparkles(ctx, x + blockW / 2, y, blockW);
      }
    }

    // Moving block above stack (slightly offset to show gameplay)
    const movingY = startY - blocks * (blockH + gap) - 40;
    const movingX = startX + 30; // slightly offset
    const movingColor = PALETTE[blocks % PALETTE.length];

    // Moving block shadow
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    roundRect(ctx, movingX + 4, movingY + 4, blockW, blockH, 14);
    ctx.fill();

    // Moving block with dashed outline to show motion
    const mGrad = ctx.createLinearGradient(movingX, movingY, movingX, movingY + blockH);
    mGrad.addColorStop(0, lighten(movingColor, 20));
    mGrad.addColorStop(0.5, movingColor);
    mGrad.addColorStop(1, darken(movingColor, 20));
    ctx.fillStyle = mGrad;
    roundRect(ctx, movingX, movingY, blockW, blockH, 14);
    ctx.fill();

    // Motion trail for moving block
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = movingColor;
    roundRect(ctx, movingX + 60, movingY, blockW, blockH, 14);
    ctx.fill();
    ctx.globalAlpha = 0.07;
    roundRect(ctx, movingX + 110, movingY, blockW, blockH, 14);
    ctx.fill();
    ctx.globalAlpha = 1;

    // "PERFECT STACK" text
    ctx.textAlign = "center";

    // Text shadow
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.font = "bold 88px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("PERFECT", S / 2 + 3, 183);
    ctx.font = "bold 108px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("STACK", S / 2 + 3, 283);

    // Main text
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 88px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("PERFECT", S / 2, 180);

    // "STACK" with gold gradient
    const tGrad = ctx.createLinearGradient(S / 2 - 180, 220, S / 2 + 180, 280);
    tGrad.addColorStop(0, "#FFD700");
    tGrad.addColorStop(0.5, "#FFF3B0");
    tGrad.addColorStop(1, "#FFD700");
    ctx.fillStyle = tGrad;
    ctx.font = "bold 108px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("STACK", S / 2, 280);

    // Tagline
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.font = "500 32px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("TAP \u2022 STACK \u2022 COMPETE", S / 2, 870);

    // Developer credit
    ctx.fillStyle = "rgba(255,255,255,0.45)";
    ctx.font = "500 30px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("- KWNG -", S / 2, 940);

    // --- Helper functions ---

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawSparkles(ctx, cx, cy, spread) {
      const sparkles = [
        { x: cx - spread * 0.5, y: cy - 20, s: 12 },
        { x: cx + spread * 0.5, y: cy - 15, s: 10 },
        { x: cx - spread * 0.3, y: cy - 40, s: 8 },
        { x: cx + spread * 0.35, y: cy - 35, s: 14 },
        { x: cx, y: cy - 50, s: 10 },
      ];
      sparkles.forEach(sp => {
        ctx.fillStyle = "rgba(255, 215, 0, 0.9)";
        drawStar(ctx, sp.x, sp.y, sp.s);
      });
    }

    function drawStar(ctx, x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        ctx.rotate(Math.PI / 4);
        ctx.lineTo(0, size);
        ctx.lineTo(0, size * 0.35);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function lighten(hex, pct) {
      const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + pct);
      const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + pct);
      const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + pct);
      return `rgb(${r},${g},${b})`;
    }

    function darken(hex, pct) {
      const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - pct);
      const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - pct);
      const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - pct);
      return `rgb(${r},${g},${b})`;
    }

    function download() {
      const link = document.createElement("a");
      link.download = "app-icon-1024x1024.png";
      link.href = c.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
