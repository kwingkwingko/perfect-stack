<!DOCTYPE html>
<html>
<head>
  <title>Perfect Stack - Feature Graphic Generator</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, sans-serif;
      color: #fff;
    }
    canvas {
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      margin: 20px;
    }
    button {
      padding: 14px 36px;
      font-size: 18px;
      font-weight: 700;
      background: #FFD700;
      color: #0A0A1A;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #FFC107; }
    p { color: #888; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Perfect Stack — Feature Graphic (1024x500)</h2>
  <canvas id="fg" width="1024" height="500"></canvas>
  <button onclick="download()">Download Feature Graphic (PNG)</button>
  <p>1024 x 500 px — ready for Google Play Store</p>

  <script>
    const W = 1024;
    const H = 500;
    const c = document.getElementById("fg");
    const ctx = c.getContext("2d");

    const PALETTE = [
      "#FF6B6B", "#FF8E53", "#FFC107", "#66BB6A",
      "#42A5F5", "#7E57C2", "#EC407A", "#26C6DA",
    ];

    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, "#0A0A1A");
    bg.addColorStop(0.5, "#121230");
    bg.addColorStop(1, "#0A0A1A");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Subtle grid
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 48) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
    }
    for (let i = 0; i < H; i += 48) {
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
    }

    // Left stack of blocks
    const blockW = 160;
    const blockH = 36;
    const stackX = 80;
    const stackBaseY = 420;
    const blocks = 8;

    for (let i = 0; i < blocks; i++) {
      const x = stackX;
      const y = stackBaseY - i * (blockH + 4);
      const color = PALETTE[i % PALETTE.length];
      drawBlock(ctx, x, y, blockW, blockH, color);
    }

    // Sparkles on top block
    drawSparkles(ctx, stackX + blockW / 2, stackBaseY - (blocks - 1) * (blockH + 4) - 10, blockW);

    // Moving block with trail (left stack)
    const movY = stackBaseY - blocks * (blockH + 4) - 20;
    ctx.globalAlpha = 0.08;
    drawBlock(ctx, stackX + 80, movY, blockW, blockH, PALETTE[blocks % PALETTE.length]);
    ctx.globalAlpha = 0.15;
    drawBlock(ctx, stackX + 50, movY, blockW, blockH, PALETTE[blocks % PALETTE.length]);
    ctx.globalAlpha = 1;
    drawBlock(ctx, stackX + 15, movY, blockW, blockH, PALETTE[blocks % PALETTE.length]);

    // Right decorative stack (smaller, faded)
    const rStackX = 800;
    const rBaseY = 440;
    ctx.globalAlpha = 0.5;
    for (let i = 0; i < 6; i++) {
      const y = rBaseY - i * (blockH + 4);
      drawBlock(ctx, rStackX, y, blockW * 0.85, blockH, PALETTE[(i + 3) % PALETTE.length]);
    }
    ctx.globalAlpha = 1;

    // Center text — "PERFECT"
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // Text shadow
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.font = "bold 72px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("PERFECT", W / 2 + 2, 172);

    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 72px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("PERFECT", W / 2, 170);

    // "STACK" with gold gradient
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.font = "bold 90px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("STACK", W / 2 + 2, 257);

    const tGrad = ctx.createLinearGradient(W / 2 - 160, 220, W / 2 + 160, 280);
    tGrad.addColorStop(0, "#FFD700");
    tGrad.addColorStop(0.5, "#FFF3B0");
    tGrad.addColorStop(1, "#FFD700");
    ctx.fillStyle = tGrad;
    ctx.font = "bold 90px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("STACK", W / 2, 255);

    // Tagline
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.font = "500 22px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("TAP \u2022 STACK \u2022 COMPETE", W / 2, 320);

    // Developer
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.font = "500 16px -apple-system, Helvetica, Arial, sans-serif";
    ctx.fillText("- KWNG -", W / 2, 460);

    // --- Helpers ---

    function drawBlock(ctx, x, y, w, h, color) {
      const r = 8;
      // Shadow
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      roundRect(ctx, x + 3, y + 3, w, h, r);
      ctx.fill();
      // Body
      const grad = ctx.createLinearGradient(x, y, x, y + h);
      grad.addColorStop(0, lighten(color, 20));
      grad.addColorStop(0.5, color);
      grad.addColorStop(1, darken(color, 20));
      ctx.fillStyle = grad;
      roundRect(ctx, x, y, w, h, r);
      ctx.fill();
      // Shine
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      roundRect(ctx, x + 4, y + 3, w - 8, h * 0.35, r - 2);
      ctx.fill();
    }

    function drawSparkles(ctx, cx, cy, spread) {
      const sparkles = [
        { x: cx - spread * 0.45, y: cy - 12, s: 8 },
        { x: cx + spread * 0.45, y: cy - 8, s: 6 },
        { x: cx - spread * 0.2, y: cy - 25, s: 6 },
        { x: cx + spread * 0.3, y: cy - 22, s: 9 },
        { x: cx, y: cy - 30, s: 7 },
      ];
      sparkles.forEach(sp => {
        ctx.fillStyle = "rgba(255, 215, 0, 0.9)";
        drawStar(ctx, sp.x, sp.y, sp.s);
      });
    }

    function drawStar(ctx, x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        ctx.rotate(Math.PI / 4);
        ctx.lineTo(0, size);
        ctx.lineTo(0, size * 0.35);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function lighten(hex, pct) {
      const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + pct);
      const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + pct);
      const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + pct);
      return `rgb(${r},${g},${b})`;
    }

    function darken(hex, pct) {
      const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - pct);
      const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - pct);
      const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - pct);
      return `rgb(${r},${g},${b})`;
    }

    function download() {
      const link = document.createElement("a");
      link.download = "feature-graphic-1024x500.png";
      link.href = c.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
