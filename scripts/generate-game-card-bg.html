<!DOCTYPE html>
<html>
<head>
  <title>Perfect Stack - Game Card Background (No Text)</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, sans-serif;
      color: #fff;
    }
    canvas {
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      margin: 20px;
    }
    button {
      padding: 14px 36px;
      font-size: 18px;
      font-weight: 700;
      background: #FFD700;
      color: #0A0A1A;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #FFC107; }
    p { color: #888; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Perfect Stack — Game Card Background (1920x1080, no text)</h2>
  <canvas id="fg" width="1920" height="1080"></canvas>
  <button onclick="download()">Download Game Card BG (PNG)</button>
  <p>1920 x 1080 px (16:9) — no text — for Google Play Games</p>

  <script>
    const W = 1920;
    const H = 1080;
    const c = document.getElementById("fg");
    const ctx = c.getContext("2d");

    const PALETTE = [
      "#FF6B6B", "#FF8E53", "#FFC107", "#66BB6A",
      "#42A5F5", "#7E57C2", "#EC407A", "#26C6DA",
    ];

    // Background gradient
    const bg = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, W * 0.7);
    bg.addColorStop(0, "#161638");
    bg.addColorStop(1, "#0A0A1A");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Subtle grid
    ctx.strokeStyle = "rgba(255,255,255,0.025)";
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 60) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
    }
    for (let i = 0; i < H; i += 60) {
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
    }

    // Ambient glow behind center stack
    const glow = ctx.createRadialGradient(W / 2, H * 0.55, 50, W / 2, H * 0.55, 400);
    glow.addColorStop(0, "rgba(255, 215, 0, 0.08)");
    glow.addColorStop(1, "rgba(255, 215, 0, 0)");
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // Center stack
    const blockW = 300;
    const blockH = 55;
    const stackX = (W - blockW) / 2;
    const stackBaseY = H - 120;
    const blocks = 12;

    for (let i = 0; i < blocks; i++) {
      const x = stackX;
      const y = stackBaseY - i * (blockH + 5);
      const color = PALETTE[i % PALETTE.length];
      drawBlock(ctx, x, y, blockW, blockH, color, 1);
    }

    // Sparkles on top of center stack
    const topY = stackBaseY - (blocks - 1) * (blockH + 5);
    drawSparkles(ctx, W / 2, topY - 15, blockW, 1);

    // Moving block with motion trail
    const movY = topY - blockH - 30;
    ctx.globalAlpha = 0.06;
    drawBlock(ctx, stackX + 120, movY, blockW, blockH, PALETTE[blocks % PALETTE.length], 1);
    ctx.globalAlpha = 0.12;
    drawBlock(ctx, stackX + 75, movY, blockW, blockH, PALETTE[blocks % PALETTE.length], 1);
    ctx.globalAlpha = 0.25;
    drawBlock(ctx, stackX + 35, movY, blockW, blockH, PALETTE[blocks % PALETTE.length], 1);
    ctx.globalAlpha = 1;
    drawBlock(ctx, stackX + 10, movY, blockW, blockH, PALETTE[blocks % PALETTE.length], 1);

    // Left decorative stack (faded, background)
    const lBlockW = 200;
    const lBlockH = 40;
    const lStackX = 120;
    const lBaseY = H - 80;
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < 8; i++) {
      const y = lBaseY - i * (lBlockH + 4);
      drawBlock(ctx, lStackX, y, lBlockW, lBlockH, PALETTE[(i + 2) % PALETTE.length], 1);
    }
    ctx.globalAlpha = 1;

    // Right decorative stack (faded, background)
    const rStackX = W - 320;
    const rBaseY = H - 80;
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < 7; i++) {
      const y = rBaseY - i * (lBlockH + 4);
      drawBlock(ctx, rStackX, y, lBlockW, lBlockH, PALETTE[(i + 5) % PALETTE.length], 1);
    }
    ctx.globalAlpha = 1;

    // Floating sparkle particles scattered around
    const particles = [
      { x: 300, y: 200, s: 10 }, { x: 500, y: 350, s: 7 },
      { x: 1400, y: 180, s: 9 }, { x: 1600, y: 400, s: 6 },
      { x: 250, y: 600, s: 5 }, { x: 1700, y: 650, s: 8 },
      { x: 800, y: 120, s: 6 }, { x: 1100, y: 100, s: 7 },
      { x: 400, y: 800, s: 5 }, { x: 1500, y: 850, s: 6 },
    ];
    particles.forEach(p => {
      ctx.fillStyle = "rgba(255, 215, 0, 0.5)";
      drawStar(ctx, p.x, p.y, p.s);
    });

    // --- Helpers ---

    function drawBlock(ctx, x, y, w, h, color) {
      const r = 12;
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      roundRect(ctx, x + 4, y + 4, w, h, r);
      ctx.fill();
      const grad = ctx.createLinearGradient(x, y, x, y + h);
      grad.addColorStop(0, lighten(color, 25));
      grad.addColorStop(0.5, color);
      grad.addColorStop(1, darken(color, 25));
      ctx.fillStyle = grad;
      roundRect(ctx, x, y, w, h, r);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      roundRect(ctx, x + 6, y + 4, w - 12, h * 0.35, r - 3);
      ctx.fill();
    }

    function drawSparkles(ctx, cx, cy, spread) {
      const sparkles = [
        { x: cx - spread * 0.5, y: cy - 15, s: 12 },
        { x: cx + spread * 0.5, y: cy - 10, s: 10 },
        { x: cx - spread * 0.25, y: cy - 35, s: 8 },
        { x: cx + spread * 0.3, y: cy - 30, s: 14 },
        { x: cx, y: cy - 45, s: 10 },
        { x: cx - spread * 0.4, y: cy - 50, s: 7 },
        { x: cx + spread * 0.45, y: cy - 40, s: 9 },
      ];
      sparkles.forEach(sp => {
        ctx.fillStyle = "rgba(255, 215, 0, 0.9)";
        drawStar(ctx, sp.x, sp.y, sp.s);
      });
    }

    function drawStar(ctx, x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        ctx.rotate(Math.PI / 4);
        ctx.lineTo(0, size);
        ctx.lineTo(0, size * 0.35);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function lighten(hex, pct) {
      const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + pct);
      const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + pct);
      const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + pct);
      return `rgb(${r},${g},${b})`;
    }

    function darken(hex, pct) {
      const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - pct);
      const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - pct);
      const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - pct);
      return `rgb(${r},${g},${b})`;
    }

    function download() {
      const link = document.createElement("a");
      link.download = "game-card-bg-1920x1080.png";
      link.href = c.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
